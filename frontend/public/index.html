<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Hospital Management System" />
    <title>Fortis Hospital Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            --bg: #ffffff;
            --bgSecondary: #f5f5f5;
            --text: #333333;
            --textSecondary: #666666;
            --border: #e0e0e0;
            --primary: #0066cc;
            --primaryHover: #0052a3;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --card: #ffffff;
            --navbar: #2c3e50;
            --shadow: rgba(0, 0, 0, 0.1);
        }
        html.dark-mode {
            --bg: #1a1a1a;
            --bgSecondary: #2d2d2d;
            --text: #ffffff;
            --textSecondary: #b0b0b0;
            --border: #404040;
            --primary: #0066cc;
            --primaryHover: #0052a3;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --card: #252525;
            --navbar: #1a1a1a;
            --shadow: rgba(0, 0, 0, 0.5);
        }
        body {
            font-family: 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        #root {
            width: 100%;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</html>
