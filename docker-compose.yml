version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/hospital
      - JWT_SECRET=your_secret_key
      - NODE_ENV=production
    depends_on:
      - mongo
    networks:
      - hospital-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - hospital-network

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - hospital-network

volumes:
  mongo-data:

networks:
  hospital-network: