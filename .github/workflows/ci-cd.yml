name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [backend, frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Determine Dockerfile path
        id: dockerfile
        run: |
          if [ "${{ matrix.service }}" = "backend" ]; then
            echo "path=./backend/dockerfile" >> $GITHUB_OUTPUT
          else
            echo "path=./frontend/Dockerfile" >> $GITHUB_OUTPUT
          fi
        shell: bash
      
      - name: Build and test ${{ matrix.service }} image
        run: |
          docker build -f ${{ steps.dockerfile.outputs.path }} -t hospital-${{ matrix.service }}:test ./${{ matrix.service }}
      
      - name: Run basic health check (Backend)
        if: matrix.service == 'backend'
        run: |
          docker run --rm -e NODE_ENV=test hospital-backend:test npm test
        continue-on-error: true
      
      - name: Extract metadata - ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/hospital-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=${{ matrix.service }}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          file: ${{ steps.dockerfile.outputs.path }}
          push: ${{ github.event_name == 'push' && secrets.DOCKER_HUB_USERNAME != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Update docker-compose with new images
        run: |
          echo "New images available:"
          echo "Backend: ${{ secrets.DOCKER_HUB_USERNAME }}/hospital-backend:latest"
          echo "Frontend: ${{ secrets.DOCKER_HUB_USERNAME }}/hospital-frontend:latest"
          echo "To deploy: docker-compose pull && docker-compose up -d"
      
      - name: Notify deployment
        run: |
          echo "✅ CI/CD Pipeline completed successfully!"
          echo "Images are ready in Docker Hub"
